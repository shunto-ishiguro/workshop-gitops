apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app-private
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/shunto-ishiguro/workshop-gitops.git
    targetRevision: main
    path: manifests/nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
